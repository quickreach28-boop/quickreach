            <h2>Import Contacts</h2>
            <div class="file-upload-area" id="file-drop-area">
                <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: #4b6cb7;"></i>
                <p>Drag & drop your Excel/CSV file here or click to browse</p>
                <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display: none;">
                <button type="button" class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-file-upload"></i> Choose File
                </button>
            </div>
            <div id="file-info"></div>
            <div id="import-preview" class="import-preview"></div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px;">
                <button type="button" class="btn btn-danger" onclick="closeImportModal()">Cancel</button>
                <button type="button" class="btn btn-success" id="import-confirm-btn" onclick="confirmImport()"
                    disabled>
                    <i class="fas fa-check"></i> Import Data
                </button>
            </div>
        </div>
    </div>

    <!-- Include SheetJS library for Excel file processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        // Admin credentials and state
        const ADMIN_PASSWORD = "melsta2024admin"; // Change this to your desired password
        let isAdminMode = false;
        let editingIndex = -1;
        let importData = [];
        let departmentData = [];

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/a/macros/melsta.com/s/AKfycby7DmWyNaXh0j49L-i1eC6Sli7zwUDrHdXEI4vakqi4cwhGCLRse4vNNtkQQ2VVwjxWGw/exec';

        async function syncToGoogleSheets(data) {
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    mode: 'no-cors'
                });
            } catch (e) {
                console.error('Error syncing to Google Sheets:', e);
            }
        }

        // Local Database File System Access API
        const DB_NAME = "MelstaAppDB";
        const STORE_NAME = "FileHandles";
        let dbFileHandle = null;

        async function saveHandleToIndexedDB(handle) {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
                request.onsuccess = (e) => {
                    const tx = e.target.result.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put(handle, 'db_handle');
                    tx.oncomplete = () => resolve();
                };
                request.onerror = (err) => reject(err);
            });
        }

        async function getHandleFromIndexedDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
                request.onsuccess = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) { resolve(null); return; }
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const getReq = tx.objectStore(STORE_NAME).get('db_handle');
                    getReq.onsuccess = () => resolve(getReq.result);
                    getReq.onerror = () => resolve(null);
                };
                request.onerror = () => resolve(null);
            });
        }

        async function setupLocalDatabase() {
            try {
                if (!dbFileHandle) {
                    [dbFileHandle] = await window.showOpenFilePicker({
                        types: [{ description: 'CSV File', accept: { 'text/csv': ['.csv'] } }]
                    });
                }

                const opts = { mode: 'readwrite' };
                if ((await dbFileHandle.queryPermission(opts)) !== 'granted') {
                    await dbFileHandle.requestPermission(opts);
                }

                if ((await dbFileHandle.queryPermission(opts)) === 'granted') {
                    await saveHandleToIndexedDB(dbFileHandle);
                    const file = await dbFileHandle.getFile();
                    const text = await file.text();
                    departmentData = parseCSVTextToContacts(text);
                    displayResults(departmentData);
                    calculateStats();
                    alert("Local Database Connected Successfully!\\nAny changes will automatically save directly to this file, without you having to copy/paste or download.");
                    updateDBButton();
                }
            } catch (e) { console.error('DB connect failed:', e); }
        }

        function updateDBButton() {
            const btn = document.getElementById('db-connect-btn');
            if (btn && dbFileHandle) {
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Local DB Connected';
                btn.style.background = '#28a745';
            }
        }

        // Persistence: localStorage key
        const STORAGE_KEY = 'melsta_department_contacts_v1';

        // Save data to localStorage and File DB
        async function saveData() {
            try {
                const dataToSave = JSON.stringify(departmentData);
                localStorage.setItem(STORAGE_KEY, dataToSave);
            } catch (error) {
                console.error('Error saving data:', error);
            }

            // Sync to Google Sheets
            syncToGoogleSheets(departmentData || []);

            // Auto overwrite the connected physical file (no download/paste needed!)
            if (dbFileHandle) {
                try {
                    const opts = { mode: 'readwrite' };
                    if ((await dbFileHandle.queryPermission(opts)) === 'granted') {
                        const writable = await dbFileHandle.createWritable();
                        const csv = convertToCSV(departmentData);
                        await writable.write(csv);
                        await writable.close();
                        console.log("Auto-saved to local file directly.");
                    }
                } catch (e) {
                    console.error('Failed to auto-save to local file', e);
                }
            }
        }

        // Load data from localStorage (if exists)
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed)) return false;
                // Basic shape validation
                departmentData = parsed.map(item => ({
                    department: item.department || '',
                    name: item.name || '',
                    designation: item.designation || '',
                    extension: item.extension || '',
                    mobile: item.mobile || '',
                    email: item.email || ''
                }));
                return true;
            } catch (error) {
                console.error('Error loading data:', error);
                return false;
            }
        }

        // Admin modal functions
        function openAdminModal() {
            document.getElementById('adminModal').style.display = 'block';
            document.getElementById('admin-password').focus();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('admin-password').value = '';
            // Reset password visibility to hidden
            document.getElementById('admin-password').type = 'password';
            document.getElementById('password-icon').className = 'fas fa-eye';
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('admin-password');
            const passwordIcon = document.getElementById('password-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                passwordIcon.className = 'fas fa-eye';
            }
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('adminModal');
            if (event.target === modal) {
                closeAdminModal();
            }
        }

        // Keyboard support for admin modal
        document.addEventListener('keydown', function (event) {
            const modal = document.getElementById('adminModal');
            if (modal.style.display === 'block') {
                if (event.key === 'Escape') {
                    closeAdminModal();
                } else if (event.key === 'Enter') {
                    toggleAdminMode();
                }
            }
        });

        // Admin authentication
        function toggleAdminMode() {
            const password = document.getElementById('admin-password').value;
            if (password === ADMIN_PASSWORD) {
                isAdminMode = true;
                document.getElementById('admin-panel').classList.add('active');
                document.getElementById('stats-section').style.display = 'grid';
                document.getElementById('table-header').classList.remove('user-mode');
                document.querySelector('.back-button').style.display = 'flex';
                closeAdminModal();
                alert('Admin access granted!');
                displayResults(departmentData);
            } else {
                alert('Incorrect password!');
                document.getElementById('admin-password').value = '';
                document.getElementById('admin-password').focus();
            }
        }

        function logout() {
            isAdminMode = false;
            document.getElementById('admin-panel').classList.remove('active');
            document.getElementById('stats-section').style.display = 'none';
            document.getElementById('table-header').classList.add('user-mode');
            document.querySelector('.back-button').style.display = 'none';
            displayResults(departmentData);
        }

        function goToHomePage() {
            // Hide admin panel and show home content
            document.getElementById('admin-panel').classList.remove('active');
            document.getElementById('stats-section').style.display = 'none';
            document.getElementById('table-header').classList.add('user-mode');
            document.querySelector('.back-button').style.display = 'none';

            // Clear search and show all results
            document.getElementById('search-input').value = '';
            displayResults(departmentData);

            // Scroll to top of page
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Modal functions
        function openAddModal() {
            editingIndex = -1;
            document.getElementById('modal-title').textContent = 'Add New Contact';
            document.getElementById('contact-form').reset();
            document.getElementById('contact-modal').style.display = 'block';
        }

        function openEditModal(index) {
            editingIndex = index;
            const contact = departmentData[index];
            document.getElementById('modal-title').textContent = 'Edit Contact';
            document.getElementById('dept-input').value = contact.department;
            document.getElementById('name-input').value = contact.name;
            document.getElementById('designation-input').value = contact.designation;
            document.getElementById('ext-input').value = contact.extension;
            document.getElementById('mobile-input').value = contact.mobile;
            document.getElementById('email-input').value = contact.email;
            document.getElementById('contact-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('contact-modal').style.display = 'none';
        }

        function deleteContact(index) {
            if (confirm('Are you sure you want to delete this contact?')) {
                departmentData.splice(index, 1);
                saveData();
                displayResults(departmentData);
                calculateStats();
            }
        }

        // Import functions
        function openImportModal() {
            document.getElementById('import-modal').style.display = 'block';
        }

        function closeImportModal() {
            document.getElementById('import-modal').style.display = 'none';
            document.getElementById('file-info').innerHTML = '';
            document.getElementById('import-preview').innerHTML = '';
            document.getElementById('import-confirm-btn').disabled = true;
            importData = [];
        }

        // Export function
        function exportData() {
            const csv = convertToCSV(departmentData);
            downloadCSV(csv, 'melsta_hospital_contacts.csv');
            alert('A file named "melsta_hospital_contacts.csv" has been downloaded. \\n\\nIMPORTANT: To share these updates with everyone, please copy and replace the downloaded file into the NAS folder where this HTML file is located.');
        }

        function convertToCSV(data) {
            const headers = ['Department', 'Name', 'Designation', 'Extension', 'Mobile', 'Email'];
            const csvContent = [
                headers.join(','),
                ...data.map(row => [
                    `"${row.department}"`,
                    `"${row.name}"`,
                    `"${row.designation}"`,
                    `"${row.extension}"`,
                    `"${row.mobile}"`,
                    `"${row.email}"`
                ].join(','))
            ].join('\n');
            return csvContent;
        }

        function downloadCSV(csv, filename) {
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function clearAllData() {
            if (confirm('Are you sure you want to delete ALL contacts? This cannot be undone!')) {
                if (confirm('This will permanently delete all data. Are you absolutely sure?')) {
                    departmentData = [];
                    saveData();
                    displayResults(departmentData);
                    calculateStats();
                    try { localStorage.removeItem(STORAGE_KEY); } catch (e) { }
                    alert('All data has been cleared.');
                }
            }
        }

        // File handling
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                processFile(file);
            }
        }

        function processFile(file) {
            const reader = new FileReader();
            const fileExtension = file.name.split('.').pop().toLowerCase();

            document.getElementById('file-info').innerHTML = `
                <p><strong>File:</strong> ${file.name}</p>
                <p><strong>Size:</strong> ${(file.size / 1024).toFixed(2)} KB</p>
            `;

            reader.onload = function (e) {
                try {
                    if (fileExtension === 'csv') {
                        parseCSV(e.target.result);
                    } else if (fileExtension === 'xlsx' || fileExtension === 'xls') {
                        parseExcel(e.target.result);
                    }
                } catch (error) {
                    alert('Error processing file: ' + error.message);
                }
            };

            if (fileExtension === 'csv') {
                reader.readAsText(file);
            } else {
                reader.readAsBinaryString(file);
            }
        }

        // Shared CSV parsing helper: convert raw CSV text into contact objects
        function parseCSVTextToContacts(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) return [];

            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
                const row = {};
                headers.forEach((header, index) => {
                    row[header.toLowerCase()] = values[index] || '';
                });
                data.push(row);
            }

            return data.map(row => ({
                department: row.department || '',
                name: row.name || '',
                designation: row.designation || '',
                extension: row.extension || '',
                mobile: row.mobile || row['mobile no.'] || '',
                email: row.email || ''
            }));
        }

        // Parse CSV coming from the Import dialog
        function parseCSV(csvText) {
            importData = parseCSVTextToContacts(csvText);
            displayImportPreview();
        }

        function parseExcel(binaryString) {
            const workbook = XLSX.read(binaryString, { type: 'binary' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet);

            importData = jsonData.map(row => ({
                department: row.Department || row.department || '',
                name: row.Name || row.name || '',
                designation: row.Designation || row.designation || '',
                extension: row.Extension || row.extension || '',
                mobile: row.Mobile || row['Mobile No.'] || row.mobile || '',
                email: row.Email || row.email || ''
            }));

            displayImportPreview();
        }

        function displayImportPreview() {
            if (importData.length === 0) {
                document.getElementById('import-preview').innerHTML = '<p>No valid data found in file.</p>';
                return;
            }

            const previewHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Department</th>
                            <th>Name</th>
                            <th>Designation</th>
                            <th>Extension</th>
                            <th>Mobile</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${importData.slice(0, 10).map(row => `
                            <tr>
                                <td>${row.department}</td>
                                <td>${row.name}</td>
                                <td>${row.designation}</td>
                                <td>${row.extension}</td>
                                <td>${row.mobile}</td>
                                <td>${row.email}</td>
                            </tr>
                        `).join('')}
                        ${importData.length > 10 ? `<tr><td colspan="6"><em>... and ${importData.length - 10} more rows</em></td></tr>` : ''}
                    </tbody>
                </table>
            `;

            document.getElementById('import-preview').innerHTML = previewHtml;
            document.getElementById('import-confirm-btn').disabled = false;
        }

        function confirmImport() {
            if (importData.length === 0) {
                alert('No data to import.');
                return;
            }

            const confirmText = `Import ${importData.length} contacts? This will add to existing data.`;
            if (confirm(confirmText)) {
                departmentData.push(...importData);
                saveData();
                displayResults(departmentData);
                calculateStats();
                // Automatically export updated data so the user gets a fresh CSV copy
                exportData();
                closeImportModal();
                alert(`Successfully imported ${importData.length} contacts.`);
            }
        }

        // Drag and drop functionality
        function setupDragDrop() {
            const dropArea = document.getElementById('file-drop-area');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, highlight, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, unhighlight, false);
            });

            function highlight(e) {
                dropArea.classList.add('dragover');
            }

            function unhighlight(e) {
                dropArea.classList.remove('dragover');
            }

            dropArea.addEventListener('drop', handleDrop, false);

            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files.length > 0) {
                    processFile(files[0]);
                }
            }

            dropArea.addEventListener('click', () => {
                document.getElementById('file-input').click();
            });
        }

        // Calculate statistics
        function calculateStats() {
            const deptSet = new Set();
            let staffCount = 0;
            let extCount = 0;
            let emailCount = 0;

            departmentData.forEach(item => {
                deptSet.add(item.department);
                if (item.name) staffCount++;
                if (item.extension) extCount++;
                if (item.email) emailCount++;
            });

            document.getElementById('dept-count').textContent = deptSet.size;
            document.getElementById('staff-count').textContent = staffCount;
            document.getElementById('ext-count').textContent = extCount;
            document.getElementById('email-count').textContent = emailCount;
        }

        // Function to display results
        function displayResults(results) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            if (results.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">No results found matching your search.</div>';
                return;
            }

            results.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = isAdminMode ? 'department-row' : 'department-row user-mode';
                row.innerHTML = `
                    <div class="department-name" data-label="Department">${item.department}</div>
                    <div data-label="Name">${item.name}</div>
                    <div data-label="Designation">${item.designation}</div>
                    <div data-label="Extension">${item.extension}</div>
                    <div class="mobile-number" data-label="Mobile">${item.mobile}</div>
                    <div class="email-container" data-label="Email">
                        <span class="email">${item.email}</span>
                        ${item.email ? `<button class="copy-btn" onclick="copyEmail('${item.email}', this)" title="Copy email address">
                            <i class="fas fa-copy"></i> Copy
                        </button>` : ''}
                    </div>
                    <div class="action-buttons" data-label="Actions">
                        ${isAdminMode ? `
                            <button class="btn btn-primary btn-sm" onclick="openEditModal(${departmentData.indexOf(item)})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-danger btn-sm" onclick="deleteContact(${departmentData.indexOf(item)})">
                                <i class="fas fa-trash"></i>
                            </button>
                        ` : ''}
                    </div>
                `;
                resultsContainer.appendChild(row);
            });
        }

        // Helper to get selected search type (fallback if radios are removed)
        function getSelectedSearchType() {
            const selected = document.querySelector('input[name="search-type"]:checked');
            // If radios are removed, use 'auto' to search across all fields
            return selected ? selected.value : 'auto';
        }

        // Function to handle search
        function handleSearch() {
            const searchTerm = document.getElementById('search-input').value.trim().toUpperCase();
            const searchType = getSelectedSearchType();

            if (searchTerm === '') {
                displayResults(departmentData);
                return;
            }

            let results = [];

            switch (searchType) {
                case 'department':
                    results = departmentData.filter(item =>
                        item.department.toUpperCase().includes(searchTerm)
                    );
                    break;
                case 'name':
                    results = departmentData.filter(item =>
                        item.name.toUpperCase().includes(searchTerm)
                    );
                    break;
                case 'designation':
                    results = departmentData.filter(item =>
                        item.designation.toUpperCase().includes(searchTerm)
                    );
                    break;
                case 'email':
                    results = departmentData.filter(item =>
                        (item.email || '').toUpperCase().includes(searchTerm)
                    );
                    break;
                case 'auto':
                    results = departmentData.filter(item => {
                        const dept = (item.department || '').toUpperCase();
                        const name = (item.name || '').toUpperCase();
                        const desig = (item.designation || '').toUpperCase();
                        const ext = (item.extension || '').toString().toUpperCase();
                        const mobile = (item.mobile || '').toString().toUpperCase();
                        const email = (item.email || '').toUpperCase();
                        return (
                            dept.includes(searchTerm) ||
                            name.includes(searchTerm) ||
                            desig.includes(searchTerm) ||
                            ext.includes(searchTerm) ||
                            mobile.includes(searchTerm) ||
                            email.includes(searchTerm)
                        );
                    });
                    break;
            }

            displayResults(results);
            scrollToResults();
        }

        // Smoothly scroll to results container with a top offset so content isn't hidden
        function scrollToResults() {
            const container = document.querySelector('.results-container');
            if (!container) return;
            const offset = 100; // pixels
            const y = container.getBoundingClientRect().top + window.pageYOffset - offset;
            window.scrollTo({ top: y, behavior: 'smooth' });
        }

        // Form submission handler for Add / Edit Contact
        document.getElementById('contact-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const contact = {
                department: document.getElementById('dept-input').value,
                name: document.getElementById('name-input').value,
                designation: document.getElementById('designation-input').value,
                extension: document.getElementById('ext-input').value,
                mobile: document.getElementById('mobile-input').value,
                email: document.getElementById('email-input').value
            };

            if (editingIndex >= 0) {
                departmentData[editingIndex] = contact;
                alert('Contact updated successfully!');
            } else {
                departmentData.push(contact);
                alert('Contact added successfully!');
            }

            saveData();
            displayResults(departmentData);
            calculateStats();
            // Automatically export updated data so the user has a fresh CSV copy on disk
            exportData();
            closeModal();
        });

        // Event listeners
        document.getElementById('search-btn').addEventListener('click', handleSearch);

        document.getElementById('search-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                handleSearch();
            }
            updateSuggestions(e);
        });

        (function attachSearchTypeListeners() {
            const radios = document.querySelectorAll('input[name="search-type"]');
            if (!radios || radios.length === 0) return; // radios removed in UI
            radios.forEach(radio => {
                radio.addEventListener('change', () => { handleSearch(); clearSuggestions(); });
            });
        })();

        document.getElementById('file-input').addEventListener('change', handleFileSelect);

        // ---------- Auto-suggestion logic ----------
        let activeSuggestionIndex = -1;

        function getSuggestionPool(term) {
            const type = getSelectedSearchType();
            const U = term.toUpperCase();
            return departmentData.filter(item => {
                const dept = (item.department || '').toUpperCase();
                const name = (item.name || '').toUpperCase();
                const desig = (item.designation || '').toUpperCase();
                const ext = (item.extension || '').toString().toUpperCase();
                const mobile = (item.mobile || '').toString().toUpperCase();
                const email = (item.email || '').toUpperCase();
                switch (type) {
                    case 'department': return dept.includes(U);
                    case 'name': return name.includes(U);
                    case 'designation': return desig.includes(U);
                    case 'email': return email.includes(U);
                    case 'auto': default:
                        return dept.includes(U) || name.includes(U) || desig.includes(U) ||
                            ext.includes(U) || mobile.includes(U) || email.includes(U);
                }
            });
        }

        function updateSuggestions(e) {
            const input = document.getElementById('search-input');
            const term = input.value.trim().toUpperCase();
            const container = document.getElementById('search-suggestions');
            if (!term) { clearSuggestions(); return; }

            const suggestions = [];
            const seen = new Set();
            getSuggestionPool(term).forEach(contact => {
                const name = contact.name || '';
                const designation = contact.designation || '';
                const key = `${name}|${designation}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    suggestions.push({
                        name,
                        designation,
                        display: designation ? `${name} — ${designation}` : name
                    });
                }
            });

            const list = suggestions.slice(0, 8);
            if (list.length === 0) { clearSuggestions(); return; }

            const html = `
                <div class="suggestions-list">
                    ${list.map((s, idx) => `
                        <div class="suggestion-item" role="option" data-index="${idx}">
                            <span class="suggestion-label">Suggest</span>
                            <span>${s.display}</span>
                        </div>
                    `).join('')}
                </div>`;
            container.innerHTML = html;
            activeSuggestionIndex = -1;

            container.querySelectorAll('.suggestion-item').forEach((el, idx) => {
                el.addEventListener('mousedown', () => {
                    input.value = list[idx].name || el.querySelector('span:last-child').textContent;
                    clearSuggestions();
                    handleSearch();
                });
            });

            handleSuggestionKeyboard(input, container, list.length, e);
        }

        function handleSuggestionKeyboard(input, container, count, e) {
            if (!['ArrowDown', 'ArrowUp', 'Enter', 'Escape'].includes(e.key)) return;
            const items = container.querySelectorAll('.suggestion-item');
            if (e.key === 'ArrowDown') {
                activeSuggestionIndex = (activeSuggestionIndex + 1) % count;
            } else if (e.key === 'ArrowUp') {
                activeSuggestionIndex = (activeSuggestionIndex - 1 + count) % count;
            } else if (e.key === 'Enter' && activeSuggestionIndex >= 0) {
                e.preventDefault();
                input.value = items[activeSuggestionIndex].querySelector('span:last-child').textContent;
                clearSuggestions();
                handleSearch();
                return;
            } else if (e.key === 'Escape') {
                clearSuggestions();
                return;
            }

            items.forEach((el, idx) => el.classList.toggle('active', idx === activeSuggestionIndex));
        }

        function clearSuggestions() {
            document.getElementById('search-suggestions').innerHTML = '';
            activeSuggestionIndex = -1;
        }

        // Close modal when clicking outside or on close button
        window.addEventListener('click', function (event) {
            const contactModal = document.getElementById('contact-modal');
            const importModal = document.getElementById('import-modal');

            if (event.target === contactModal) {
                closeModal();
            }
            if (event.target === importModal) {
                closeImportModal();
            }
        });

        document.querySelectorAll('.close').forEach(closeBtn => {
            closeBtn.addEventListener('click', function () {
                closeModal();
                closeImportModal();
            });
        });

        // Function to copy email address to clipboard
        function copyEmail(email, button) {
            if (navigator.clipboard && window.isSecureContext) {
                // Use modern clipboard API
                navigator.clipboard.writeText(email).then(() => {
                    showCopySuccess(button);
                }).catch(() => {
                    fallbackCopyTextToClipboard(email, button);
                });
            } else {
                // Fallback for older browsers
                fallbackCopyTextToClipboard(email, button);
            }
        }

        // Fallback copy function for older browsers
        function fallbackCopyTextToClipboard(text, button) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            textArea.style.top = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showCopySuccess(button);
                } else {
                    showCopyError(button);
                }
            } catch (err) {
                showCopyError(button);
            }

            document.body.removeChild(textArea);
        }

        // Show copy success feedback
        function showCopySuccess(button) {
            const originalHTML = button.innerHTML;
            button.innerHTML = '<i class="fas fa-check"></i> Copied!';
            button.classList.add('copy-success');

            setTimeout(() => {
                button.innerHTML = originalHTML;
                button.classList.remove('copy-success');
            }, 2000);
        }

        // Show copy error feedback
        function showCopyError(button) {
            const originalHTML = button.innerHTML;
            button.innerHTML = '<i class="fas fa-times"></i> Failed';
            button.style.background = '#dc3545';
            button.style.color = 'white';
            button.style.borderColor = '#dc3545';

            setTimeout(() => {
                button.innerHTML = originalHTML;
                button.style.background = '';
                button.style.color = '';
                button.style.borderColor = '';
            }, 2000);
        }

        // Function to ensure search overlay stays top-centered
        function ensureSearchOverlayCentered() {
            const searchOverlay = document.querySelector('.search-overlay');
            if (searchOverlay) {
                searchOverlay.style.position = 'absolute';
                searchOverlay.style.top = '5%';
                searchOverlay.style.left = '50%';
                searchOverlay.style.transform = 'translate(-50%, 0)';
                searchOverlay.style.display = 'flex';
            }
        }

        // Load data from Google Sheets
        async function loadFromGoogleSheets() {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                if (!response.ok) return false;
                const data = await response.json();
                if (!data || data.length === 0) return false;

                departmentData = data.map(item => ({
                    department: item.department || '',
                    name: item.name || '',
                    designation: item.designation || '',
                    extension: item.extension || '',
                    mobile: item.mobile || '',
                    email: item.email || ''
                }));

                // Save locally for offline use
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(departmentData));
                } catch (e) { }

                return true;
            } catch (err) {
                console.error('Error loading Google Sheets data:', err);
                return false;
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', async function () {
            let loadedFromDB = false;

            // 1. Try to load from Local Database File (Laptop mode)
            try {
                dbFileHandle = await getHandleFromIndexedDB();
                if (dbFileHandle) {
                    const opts = { mode: 'readwrite' };
                    // If already granted, read it directly
                    if ((await dbFileHandle.queryPermission(opts)) === 'granted') {
                        const file = await dbFileHandle.getFile();
                        const text = await file.text();
                        departmentData = parseCSVTextToContacts(text);
                        loadedFromDB = true;
                        setTimeout(updateDBButton, 1000);
                    }
                }
            } catch (e) {
                console.error("Local DB load error", e);
            }

            if (!loadedFromDB) {
                // 2. Try to load from Google Sheets first
                const loadedFromSheets = await loadFromGoogleSheets();
                // 3. Fallback to localStorage
                if (!loadedFromSheets) {
                    loadData();
                }
            }
            displayResults(departmentData);
            calculateStats();
            setupDragDrop();
            // Scroll reveal for professional animations
            setupRevealAnimations();
            // Ensure search overlay stays centered
            ensureSearchOverlayCentered();

            // Monitor for any changes that might affect positioning
            setInterval(ensureSearchOverlayCentered, 1000);

            // Start real-time sync (Auto refresh data every 3 seconds)
            setInterval(async () => {
                let currentSearchTerm = document.getElementById('search-input') ? document.getElementById('search-input').value.trim() : '';

                if (dbFileHandle && (await dbFileHandle.queryPermission({ mode: 'read' })) === 'granted') {
                    // Sync from Local Database File
                    try {
                        const file = await dbFileHandle.getFile();
                        const text = await file.text();
                        const newContacts = parseCSVTextToContacts(text);
                        if (JSON.stringify(newContacts) !== JSON.stringify(departmentData)) {
                            departmentData = newContacts;

                            // Save to local storage quietly so refreshing doesn't lose it
                            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(departmentData)); } catch (e) { }

                            // Only redraw if not searching, or rerun search
                            if (currentSearchTerm === '') {
                                displayResults(departmentData);
                            } else {
                                handleSearch();
                            }
                            calculateStats();
                        }
                    } catch (e) { }
                } else if (!dbFileHandle) {
                    // Sync from Google Sheets
                    try {
                        const response = await fetch(GOOGLE_SCRIPT_URL);
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.length > 0) {
                                const newContacts = data.map(item => ({
                                    department: item.department || '',
                                    name: item.name || '',
                                    designation: item.designation || '',
                                    extension: item.extension || '',
                                    mobile: item.mobile || '',
                                    email: item.email || ''
                                }));

                                if (JSON.stringify(newContacts) !== JSON.stringify(departmentData)) {
                                    departmentData = newContacts;

                                    // Save to local storage quietly so refreshing doesn't lose it
                                    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(departmentData)); } catch (e) { }

                                    // Only redraw if not searching, or rerun search
                                    if (currentSearchTerm === '') {
                                        displayResults(departmentData);
                                    } else {
                                        handleSearch();
                                    }
                                    calculateStats();
                                }
                            }
                        }
                    } catch (e) { }
                }
            }, 3000); // Check every 3 seconds

            // Trigger page start animation
            document.body.classList.remove('page-loading');
            document.body.classList.add('page-loaded');
            // Begin title typing after page fade-in
            setTimeout(() => document.body.classList.add('start-typing'), 700);
        });

        function setupRevealAnimations() {
            const elements = document.querySelectorAll('.reveal');
            if ('IntersectionObserver' in window) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { rootMargin: '0px 0px -10% 0px', threshold: 0.12 });

                elements.forEach(el => observer.observe(el));
            } else {
                // Fallback: show all
                elements.forEach(el => el.classList.add('is-visible'));
            }
        }
    </script>
