<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Reach</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f5ff;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        /* Page start animation */
        body.page-loading {
            opacity: 0;
            transform: translateY(10px);
        }

        body.page-loaded {
            animation: page-entry 600ms cubic-bezier(.22, .61, .36, 1) forwards;
        }

        @keyframes page-entry {
            to {
                opacity: 1;
                transform: none;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: white;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        .description {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto;
        }

        .admin-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: none;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #4b6cb7;
            color: white;
        }

        .btn-primary:hover {
            background: #3a5795;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-warning:hover {
            background: #e0a800;
        }

        .login-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        .login-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .login-form input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Admin Icon Button */
        .admin-icon {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(75, 108, 183, 0.4);
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .admin-icon:hover {
            background: linear-gradient(135deg, #5a7bc7 0%, #2a3a58 100%);
            transform: scale(1.15) rotate(15deg);
            box-shadow: 0 12px 35px rgba(75, 108, 183, 0.6);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .admin-icon:active {
            transform: scale(1.05) rotate(5deg);
        }

        .admin-icon::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #4b6cb7, #182848, #4b6cb7);
            border-radius: 50%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .admin-icon:hover::before {
            opacity: 0.3;
        }

        /* Admin Popup Modal */
        .admin-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .admin-modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-modal h3 {
            margin-bottom: 20px;
            color: #4b6cb7;
            font-size: 24px;
        }

        .admin-modal .password-container {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .admin-modal input {
            width: 100%;
            padding: 15px 50px 15px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .admin-modal input:focus {
            outline: none;
            border-color: #4b6cb7;
        }

        .admin-modal .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: color 0.3s ease;
        }

        .admin-modal .password-toggle:hover {
            color: #4b6cb7;
        }

        .admin-modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .admin-modal .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .admin-modal .btn-primary {
            background: #4b6cb7;
            color: white;
        }

        .admin-modal .btn-primary:hover {
            background: #3a5a9a;
        }

        .admin-modal .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .admin-modal .btn-secondary:hover {
            background: #5a6268;
        }

        /* Back Button */
        .back-button {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(75, 108, 183, 0.9);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .back-button:hover {
            background: rgba(75, 108, 183, 1);
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .back-button i {
            font-size: 16px;
        }

        .search-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            position: relative;
            z-index: 10;
        }

        /* Professional search interface positioned over photo banner */
        .search-overlay {
            position: absolute !important;
            top: 5% !important;
            /* raise title and caption higher */
            left: 50% !important;
            transform: translate(-50%, 0) !important;
            z-index: 20;
            display: flex !important;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            /* bring caption very close to title */
            width: 100%;
            max-width: 900px;
            padding: 0 30px;
            animation: searchFadeIn 1s ease-out;
        }

        @keyframes searchFadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, 30px) !important;
            }

            to {
                opacity: 1;
                transform: translate(-50%, 0) !important;
            }
        }

        /* Keep search overlay locked to top-center */
        .search-overlay.reveal,
        .search-overlay.reveal.is-visible {
            position: absolute !important;
            top: 5% !important;
            left: 50% !important;
            transform: translate(-50%, 0) !important;
            display: flex !important;
        }

        .search-overlay .search-controls {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 20px 35px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2), 0 4px 20px rgba(75, 108, 183, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .search-overlay .search-controls:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.25), 0 6px 25px rgba(75, 108, 183, 0.15);
        }

        .search-overlay .search-box {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2), 0 4px 20px rgba(75, 108, 183, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .search-overlay .search-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.25), 0 6px 25px rgba(75, 108, 183, 0.15);
        }

        .search-overlay .search-type label {
            font-weight: 600;
            font-size: 0.95rem;
            color: #2c3e50;
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 25px;
            position: relative;
        }

        .search-overlay .search-type label:hover {
            background: rgba(75, 108, 183, 0.1);
            color: #4b6cb7;
        }

        .search-overlay .search-type input[type="radio"] {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            accent-color: #4b6cb7;
        }

        .search-overlay .search-type input[type="radio"]:checked+i {
            color: #4b6cb7;
        }

        .search-overlay .search-type i {
            font-size: 1.1rem;
            margin-right: 6px;
            color: #6c757d;
            transition: color 0.3s ease;
        }

        .search-overlay #search-input {
            font-size: 1.2rem;
            padding: 18px 25px;
            border: none;
            background: transparent;
            color: #2c3e50;
            font-weight: 500;
        }

        .search-overlay #search-input::placeholder {
            color: #6c757d;
            font-weight: 400;
        }

        .search-overlay #search-btn {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 0 60px 60px 0;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .search-overlay #search-btn:hover {
            background: linear-gradient(135deg, #3a5795 0%, #0f1a2e 100%);
            transform: scale(1.02);
        }

        .search-overlay #search-btn:active {
            transform: scale(0.98);
        }

        .search-title {
            text-align: center;
            margin-bottom: 10px;
        }

        .search-title h2 {
            color: white;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 4px 8px rgba(0, 0, 0, 0.6), 0 6px 12px rgba(0, 0, 0, 0.4);
            letter-spacing: 1px;
            /* add a subtle dash of spacing to letters */
            white-space: nowrap;
            /* keep title on one line */
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
            /* add subtle glow */
        }

        .search-title h2 i {
            margin-right: 12px;
            color: #ffffff;
        }

        .search-title p {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 500;
            /* slightly bolder for better visibility */
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5), 0 2px 4px rgba(0, 0, 0, 0.3);
            margin: 0;
            letter-spacing: 0.6px;
            /* subtle spacing for caption */
            margin-top: -25px;
            /* raise caption a little more */
            filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.1));
            /* reduced glow intensity */
        }

        .search-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .search-type {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-type label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-weight: 500;
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 50px;
            overflow: hidden;
        }

        .suggestions {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-bottom: 8px;
        }

        .suggestions-list {
            position: absolute;
            top: 8px;
            /* place dropdown below input */
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            overflow: auto;
            max-height: 280px;
            z-index: 50;
        }

        .suggestion-item {
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid #f1f3f7;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover,
        .suggestion-item.active {
            background: #eef4ff;
        }

        .suggestion-label {
            font-size: 12px;
            color: #4b6cb7;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        #search-input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            font-size: 1.1rem;
            outline: none;
        }

        #search-btn {
            padding: 15px 25px;
            background: #4b6cb7;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        #search-btn:hover {
            background: #3a5795;
        }

        .results-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table-header {
            display: grid;
            grid-template-columns: 1.2fr 1.5fr 1fr 0.8fr 1.2fr 1.5fr 0.6fr;
            background: #4b6cb7;
            color: white;
            font-weight: bold;
            padding: 15px 20px;
        }

        .table-header.user-mode {
            grid-template-columns: 1.2fr 1.5fr 1fr 0.8fr 1.2fr 1.5fr;
        }

        .department-row {
            display: grid;
            grid-template-columns: 1.2fr 1.5fr 1fr 0.8fr 1.2fr 1.5fr 0.6fr;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            align-items: center;
        }

        .department-row.user-mode {
            grid-template-columns: 1.2fr 1.5fr 1fr 0.8fr 1.2fr 1.5fr;
        }

        .department-row:nth-child(even) {
            background-color: #f9fafc;
        }

        .department-row:hover {
            background-color: #edf1f7;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #666;
            font-style: italic;
        }

        .department-name {
            font-weight: bold;
            color: #2c3e50;
        }

        .mobile-number {
            color: #2c5282;
        }

        .email {
            color: #8b5cf6;
            word-break: break-all;
            position: relative;
        }

        .email-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            color: #2196f3;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .copy-btn:hover {
            background: #2196f3;
            color: white;
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-success {
            background: #4caf50 !important;
            color: white !important;
            border-color: #4caf50 !important;
        }

        .instructions {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .instructions h3 {
            color: #4b6cb7;
            margin-bottom: 10px;
        }

        /* Photo banner with professional title */
        .photo-banner {
            margin-bottom: 30px;
            position: relative !important;
            overflow: visible !important;
        }

        .photo-banner figure {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            background: #eef2f7;
            opacity: 0;
            transform: translateY(14px);
            animation: banner-reveal 900ms ease-out forwards;
        }

        .photo-banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        .photo-banner figcaption {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 16px 20px;
            color: white;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.0) 100%);
            display: flex;
            align-items: baseline;
            gap: 10px;
            opacity: 0;
            transform: translateY(8px);
            animation: caption-reveal 800ms ease-out 250ms forwards;
        }

        .photo-banner #photo-title {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: .3px;
        }

        .photo-banner .title-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            border-radius: 8px;
            color: #fff;
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            box-shadow: 0 4px 12px rgba(24, 40, 72, 0.3);
            animation: title-glow 2600ms ease-in-out infinite alternate;
        }

        @keyframes title-glow {
            from {
                box-shadow: 0 6px 16px rgba(24, 40, 72, 0.28);
                transform: translateY(0);
            }

            to {
                box-shadow: 0 8px 22px rgba(75, 108, 183, 0.55);
                transform: translateY(-1px);
            }
        }

        /* Enhanced typing animation with multiple effects */
        .typing-text {
            overflow: hidden;
            border-right: 2px solid #fff;
            white-space: nowrap;
            animation: typing 2s steps(25, end), blink-caret 0.75s step-end infinite, text-glow 3s ease-in-out infinite alternate;
            position: relative;
        }

        /* One-time typing effect for initial page load (no continuous blink) */
        .typing-once {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #fff;
            width: 0;
        }

        /* Start typing only after page reveals */
        body.start-typing .typing-once {
            animation: typing 2.1s steps(var(--typing-steps, 25), end) forwards, caret-hide 0s linear 2.1s forwards;
        }

        @keyframes caret-hide {
            to {
                border-right-color: transparent;
            }
        }

        .typing-text::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
            animation: shimmer 2.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        @keyframes blink-caret {

            from,
            to {
                border-color: transparent;
            }

            50% {
                border-color: #fff;
            }
        }

        @keyframes text-glow {
            from {
                text-shadow: 0 0 5px rgba(255, 255, 255, 0.5), 0 0 10px rgba(255, 255, 255, 0.3);
                transform: scale(1);
            }

            to {
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.5), 0 0 30px rgba(255, 255, 255, 0.3);
                transform: scale(1.02);
            }
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        /* Background based media so it still shows if image fails */
        .photo-banner .banner-media {
            width: 100%;
            display: block;
            padding-top: 45%;
            /* taller to show full board/sign */
            background-color: #e1e7f3;
            background-image: var(--banner-image, none);
            background-size: cover;
            background-position: top center;
            /* focus on hospital board */
            background-repeat: no-repeat;
            transform: scale(1.06);
            animation: banner-kenburns 8s ease-out forwards;
            image-rendering: -webkit-optimize-contrast;
            /* improve image quality */
            image-rendering: crisp-edges;
            /* improve image quality */
        }

        /* Global professional reveal animations */
        .reveal {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 600ms cubic-bezier(.22, .61, .36, 1), transform 600ms cubic-bezier(.22, .61, .36, 1);
            transition-delay: var(--reveal-delay, 0ms);
            will-change: opacity, transform;
        }

        .reveal.is-visible {
            opacity: 1;
            transform: none;
        }

        /* Simple entrance and Ken Burns animations */
        @keyframes banner-reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes caption-reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes banner-kenburns {
            from {
                transform: scale(1.06);
            }

            to {
                transform: scale(1);
            }
        }

        /* Respect user motion preferences */
        @media (prefers-reduced-motion: reduce) {

            .photo-banner figure,
            .photo-banner .banner-media,
            .photo-banner figcaption,
            .reveal {
                animation: none !important;
                transition: none !important;
                transform: none !important;
                opacity: 1 !important;
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 20px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 160px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .stat-box h3 {
            color: #4b6cb7;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        /* Colored stat boxes matching logo colors */
        .stat-green {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%) !important;
            color: white !important;
        }

        .stat-green h3 {
            color: white !important;
        }

        .stat-blue {
            background: linear-gradient(135deg, #2196f3 0%, #1565c0 100%) !important;
            color: white !important;
        }

        .stat-blue h3 {
            color: white !important;
        }

        .stat-yellow {
            background: linear-gradient(135deg, #ffc107 0%, #f57c00 100%) !important;
            color: #333 !important;
        }

        .stat-yellow h3 {
            color: #333 !important;
        }

        .stat-red {
            background: linear-gradient(135deg, #f44336 0%, #c62828 100%) !important;
            color: white !important;
        }

        .stat-red h3 {
            color: white !important;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: black;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .file-upload-area {
            border: 2px dashed #4b6cb7;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            background: #f8f9ff;
        }

        .file-upload-area.dragover {
            background: #e6f0ff;
            border-color: #2c5282;
        }

        #file-input {
            margin: 10px 0;
        }

        .import-preview {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 10px 0;
        }

        .import-preview table {
            width: 100%;
            border-collapse: collapse;
        }

        .import-preview th,
        .import-preview td {
            padding: 8px;
            border: 1px solid #eee;
            text-align: left;
            font-size: 12px;
        }

        .import-preview th {
            background: #f5f5f5;
            font-weight: bold;
        }

        @media (max-width: 768px) {

            .table-header,
            .department-row {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 10px;
            }

            .table-header {
                display: none;
            }

            .department-row {
                padding: 20px;
                border-bottom: 2px solid #eee;
                display: block;
            }

            .department-row>div {
                margin-bottom: 8px;
                padding: 5px 0;
            }

            .department-row>div:before {
                content: attr(data-label) ": ";
                font-weight: bold;
                color: #4b6cb7;
            }

            .search-controls {
                flex-direction: column;
                border-radius: 10px;
            }

            .search-overlay {
                position: absolute !important;
                top: 8% !important;
                /* slightly lower on small screens but still higher */
                left: 50% !important;
                transform: translate(-50%, 0) !important;
                padding: 0 15px;
                gap: 3px;
                /* bring caption very close to title on mobile too */
            }

            .search-title h2 {
                font-size: 1.8rem;
            }

            .search-title p {
                font-size: 1.1rem;
                color: #ffffff;
                text-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
            }

            .search-overlay .search-controls {
                padding: 15px 20px;
                border-radius: 30px;
                flex-direction: column;
                gap: 10px;
            }

            .search-overlay .search-type {
                flex-direction: column;
                gap: 8px;
            }

            .search-overlay .search-type label {
                font-size: 0.9rem;
                padding: 6px 10px;
            }

            .search-overlay .search-box {
                border-radius: 30px;
            }

            .search-overlay #search-input {
                font-size: 1.1rem;
                padding: 15px 20px;
            }

            .search-overlay #search-btn {
                padding: 15px 25px;
                font-size: 1rem;
                border-radius: 0 30px 30px 0;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                max-width: 600px;
                gap: 10px;

            }

            .admin-controls {
                justify-content: center;
            }

            .modal-content {
                width: 95%;
                margin: 10% auto;
            }
        }
    </style>
</head>

    <!-- Add/Edit Contact Modal -->
    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">Add New Contact</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label for="dept-input">Department:</label>
                    <input type="text" id="dept-input" required>
                </div>
                <div class="form-group">
                    <label for="name-input">Name:</label>
                    <input type="text" id="name-input">
                </div>
                <div class="form-group">
                    <label for="designation-input">Designation:</label>
                    <input type="text" id="designation-input">
                </div>
                <div class="form-group">
                    <label for="ext-input">Extension:</label>
                    <input type="text" id="ext-input">
                </div>
                <div class="form-group">
                    <label for="mobile-input">Mobile Number:</label>
                    <input type="text" id="mobile-input">
                </div>
                <div class="form-group">
                    <label for="email-input">Email:</label>
                    <input type="email" id="email-input">
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-danger" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-success">Save</button>
                </div>
            </form>
        </div>
    </div>
